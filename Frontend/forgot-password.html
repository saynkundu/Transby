<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitOps | Forgot Password</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/auth.css">
</head>

<body>

    <div id="login-container">

        <!-- Left Section -->
        <section id="left-section">

            <!-- Logo -->
            <div id="logo">

                <i class="fa-solid fa-truck-fast"></i>

                <div>

                    <h1>TransitOps</h1>

                    <p>Smart Transport Operations Platform</p>

                </div>

            </div>

            <!-- Heading -->

            <div id="welcome-text">

                <h2>Forgot Password?</h2>

                <p>

                    Enter your registered email address.
                    We'll send an OTP to verify your identity.

                </p>

            </div>

            <!-- Form -->

            <form id="forgot-password-form">

                <!-- Email -->

                <div class="input-group">

                    <label for="email">

                        Email Address

                    </label>

                    <div class="input-box">

                        <i class="fa-solid fa-envelope"></i>

                        <input
                            type="email"
                            id="email"
                            placeholder="Enter your registered email"
                            required>

                    </div>

                </div>

                <!-- Send OTP Button -->

                <button
                    type="button"
                    id="login-btn"
                    onclick="showOTP()">

                    <i class="fa-solid fa-paper-plane"></i>

                    Send OTP

                </button>

                <!-- OTP Section -->

                <div id="otp-section" style="display:none; margin-top:25px;">

                    <div class="input-group">

                        <label>

                            Enter OTP

                        </label>

                        <div class="input-box">

                            <i class="fa-solid fa-key"></i>

                            <input
                                type="text"
                                id="otp"
                                maxlength="6"
                                placeholder="Enter 6-digit OTP"
                                required>

                        </div>

                    </div>

                    <button
                        type="button"
                        id="verify-btn"
                        onclick="verifyOTP()">

                        <i class="fa-solid fa-circle-check"></i>

                        Verify OTP

                    </button>

                </div>

            </form>

            <!-- Divider -->

            <div id="divider">

                <span>OR</span>

            </div>

            <!-- Back -->

            <div id="register">

                <p>

                    Remember your password?

                    <a href="index.html">

                        Back to Login

                    </a>

                </p>

            </div>

        </section>

        <!-- Right Section -->

        <aside id="right-section">

            <div id="illustration-container">

                <img
                    src="assets/forgot-password.png"
                    alt="Forgot Password">

                <h2>Secure Account Recovery</h2>

                <p>

                    Verify your email with OTP and
                    securely reset your TransitOps password.

                </p>

            </div>

        </aside>

    </div>

    <script>

        function showOTP() {

            document.getElementById("otp-section").style.display = "block";

        }

        function verifyOTP() {

            const otp = document.getElementById("otp").value;

            if (otp.length !== 6) {

                alert("Please enter a valid 6-digit OTP.");

                return;

            }

            window.location.href = "reset-password.html";

        }

    </script>

</body>

</html>

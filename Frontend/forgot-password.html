<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitOps | Forgot Password</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/auth.css">
</head>
<style>/* =====================================
   TransitOps Forgot Password Page
   Light + Dark Mode Support
===================================== */

/* Theme Variables */
:root {
    --background: #F8FAFC;
    --card: #FFFFFF;
    --input: #F1F5F9;

    --text: #0F172A;
    --secondary-text: #64748B;

    --primary: #06B6D4;
    --hover: #0891B2;

    --border: rgba(6,182,212,0.25);
}

/* Dark Mode */
.dark-mode {
    --background: #0B1120;
    --card: #111827;
    --input: #0F172A;

    --text: #F8FAFC;
    --secondary-text: #94A3B8;

    --primary: #06B6D4;
    --hover: #0891B2;

    --border: rgba(6,182,212,0.25);
}

/* Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}

/* Body */
body {
    min-height: 100vh;
    background: var(--background);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    transition: .3s;
}

/* Main Container */
#login-container {
    width: 95%;
    max-width: 1200px;
    min-height: 650px;
    background: var(--card);
    display: flex;
    overflow: hidden;
    border-radius: 20px;
    border: 1px solid var(--border);
    box-shadow: 0 15px 40px rgba(0,0,0,0.12);
}

/* Left Section */
#left-section {
    width: 55%;
    padding: 50px 60px;
}

/* Logo */
#logo {
    display: flex;
    align-items: center;
    gap: 15px;
}

#logo i {
    font-size: 38px;
    color: var(--primary);
}

#logo h1 {
    font-size: 28px;
    color: var(--text);
    font-weight: 700;
}

#logo p {
    font-size: 13px;
    color: var(--secondary-text);
}

/* Heading */
#welcome-text {
    margin: 40px 0 30px;
}

#welcome-text h2 {
    font-size: 30px;
    color: var(--text);
    margin-bottom: 10px;
}

#welcome-text p {
    font-size: 14px;
    color: var(--secondary-text);
    line-height: 1.6;
}

/* Input */
.input-group {
    margin-bottom: 20px;
}

.input-group label {
    display: block;
    margin-bottom: 8px;
    font-size: 14px;
    color: var(--text);
}

.input-box {
    height: 50px;
    display: flex;
    align-items: center;
    background: var(--input);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0 15px;
    transition: .3s;
}

.input-box:hover,
.input-box:focus-within {
    border-color: var(--primary);
    box-shadow: 0 0 12px rgba(6,182,212,0.25);
}

.input-box i {
    color: var(--primary);
    margin-right: 12px;
}

.input-box input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 14px;
}

.input-box input::placeholder {
    color: var(--secondary-text);
}

/* Buttons */
#send-otp-btn,
#verify-btn {
    width: 100%;
    height: 50px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 600;
    transition: .3s;
}

#send-otp-btn i,
#verify-btn i {
    margin-right: 8px;
}

#send-otp-btn:hover,
#verify-btn:hover {
    background: var(--hover);
    box-shadow: 0 0 20px rgba(6,182,212,0.45);
}

/* OTP Animation */
#otp-section {
    animation: fade .3s ease;
}

@keyframes fade {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Divider */
#divider {
    display: flex;
    align-items: center;
    gap: 15px;
    margin: 30px 0;
    color: var(--secondary-text);
}

#divider::before,
#divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
}

/* Back Login */
#register {
    text-align: center;
    color: var(--secondary-text);
}

#register a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 600;
}

#register a:hover {
    color: var(--hover);
}

/* Right Section */
#right-section {
    width: 45%;
    background: var(--input);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px;
}

#illustration-container {
    text-align: center;
}

#illustration-container img {
    width: 80%;
    max-width: 350px;
    margin-bottom: 25px;
}

#illustration-container h2 {
    color: var(--primary);
    font-size: 28px;
    margin-bottom: 15px;
}

#illustration-container p {
    color: var(--secondary-text);
    font-size: 14px;
    line-height: 1.7;
}

/* Responsive */
@media (max-width:900px) {
    #login-container {
        flex-direction: column;
    }

    #left-section,
    #right-section {
        width: 100%;
    }

    #left-section {
        padding: 35px 25px;
    }

    #right-section {
        display: none;
    }
}

@media (max-width:500px) {
    #welcome-text h2 {
        font-size: 24px;
    }

    #logo h1 {
        font-size: 22px;
    }

    #logo i {
        font-size: 30px;
    }
}</style>
<body>

    <div id="login-container">

        <!-- Left Section -->
        <section id="left-section">

            <!-- Logo -->
            <div id="logo">

                <i class="fa-solid fa-truck-fast"></i>

                <div>

                    <h1>TransitOps</h1>

                    <p>Smart Transport Operations Platform</p>

                </div>

            </div>

            <!-- Heading -->

            <div id="welcome-text">

                <h2>Forgot Password?</h2>

                <p>

                    Enter your registered email address.
                    We'll send an OTP to verify your identity.

                </p>

            </div>

            <!-- Form -->

            <form id="forgot-password-form">

                <!-- Email -->

                <div class="input-group">

                    <label for="email">

                        Email Address

                    </label>

                    <div class="input-box">

                        <i class="fa-solid fa-envelope"></i>

                        <input
                            type="email"
                            id="email"
                            placeholder="Enter your registered email"
                            required>

                    </div>

                </div>

                <!-- Send OTP Button -->

                <button
                    type="button"
                    id="send-otp-btn">

                    <i class="fa-solid fa-paper-plane"></i>

                    Send OTP

                </button>

                <!-- OTP Section -->

                <div id="otp-section" style="display:none; margin-top:25px;">

                    <div class="input-group">

                        <label>

                            Enter OTP

                        </label>

                        <div class="input-box">

                            <i class="fa-solid fa-key"></i>

                            <input
                                type="text"
                                id="otp"
                                maxlength="6"
                                placeholder="Enter 6-digit OTP"
                                required>

                        </div>

                    </div>

                    <button
                        type="button"
                        id="verify-btn">

                        <i class="fa-solid fa-circle-check"></i>

                        Verify OTP

                    </button>

                </div>

            </form>

            <!-- Divider -->

            <div id="divider">

                <span>OR</span>

            </div>

            <!-- Back -->

            <div id="register">

                <p>

                    Remember your password?

                    <a href="index.html">

                        Back to Login

                    </a>

                </p>

            </div>

        </section>

        <!-- Right Section -->

        <aside id="right-section">

            <div id="illustration-container">

                <img
                    src="assets/forgot-password.png"
                    alt="Forgot Password">

                <h2>Secure Account Recovery</h2>

                <p>

                    Verify your email with OTP and
                    securely reset your TransitOps password.

                </p>

            </div>

        </aside>

    </div>

    <script>

        const emailInput = document.getElementById('email');
        const sendOtpButton = document.getElementById('send-otp-btn');
        const verifyButton = document.getElementById('verify-btn');

        async function readResponse(response) {
            const result = await response.json();
            if (!response.ok) {
                const message = Array.isArray(result.detail)
                    ? result.detail.map(item => item.msg).join(', ')
                    : result.detail;
                throw new Error(message || 'Something went wrong.');
            }
            return result;
        }

        sendOtpButton.addEventListener('click', async () => {
            if (!emailInput.reportValidity()) return;

            sendOtpButton.disabled = true;
            try {
                const response = await fetch('/api/password-reset/request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailInput.value.trim() })
                });
                const result = await readResponse(response);
                document.getElementById('otp-section').style.display = 'block';
                emailInput.readOnly = true;
                alert(result.message);
            } catch (error) {
                alert(error.message);
            } finally {
                sendOtpButton.disabled = false;
            }
        });

        verifyButton.addEventListener('click', async () => {
            const otp = document.getElementById('otp').value.trim();
            if (!/^\d{6}$/.test(otp)) {
                alert('Please enter a valid 6-digit OTP.');
                return;
            }

            verifyButton.disabled = true;
            try {
                const response = await fetch('/api/password-reset/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailInput.value.trim(), otp })
                });
                const result = await readResponse(response);
                sessionStorage.setItem('passwordResetToken', result.reset_token);
                window.location.href = 'reset-password.html';
            } catch (error) {
                alert(error.message);
            } finally {
                verifyButton.disabled = false;
            }
        });

    </script>

</body>

</html>

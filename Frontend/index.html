<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitOps | Login</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<style>/* =====================================
   TransitOps Login Page
   Light + Dark Mode Support
===================================== */

/* Theme Variables */

:root {
    --background: #F8FAFC;
    --card: #FFFFFF;
    --input: #F1F5F9;

    --text: #0F172A;
    --secondary-text: #64748B;

    --primary: #06B6D4;
    --hover: #0891B2;

    --border: rgba(6,182,212,0.25);
}

/* Dark Mode */

.dark-mode {
    --background: #0B1120;
    --card: #111827;
    --input: #0F172A;

    --text: #F8FAFC;
    --secondary-text: #94A3B8;

    --primary: #06B6D4;
    --hover: #0891B2;

    --border: rgba(6,182,212,0.25);
}

/* Reset */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}

body {
    min-height: 100vh;
    background: var(--background);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    transition: .3s;
}

/* Main Container */

#login-container {
    width: 95%;
    max-width: 1200px;
    min-height: 650px;
    background: var(--card);
    display: flex;
    overflow: hidden;
    border-radius: 20px;
    border: 1px solid var(--border);
    box-shadow: 0 15px 40px rgba(0,0,0,0.12);
    transition: .3s;
}

/* Left Section */

#left-section {
    width: 55%;
    padding: 50px 60px;
}

/* Logo */

#logo {
    display: flex;
    align-items: center;
    gap: 15px;
}

#logo i {
    font-size: 38px;
    color: var(--primary);
}

#logo h1 {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
}

#logo p {
    font-size: 13px;
    color: var(--secondary-text);
}

/* Welcome Text */

#welcome-text {
    margin: 40px 0 30px;
}

#welcome-text h2 {
    font-size: 30px;
    color: var(--text);
    margin-bottom: 8px;
}

#welcome-text p {
    color: var(--secondary-text);
    font-size: 14px;
}

/* Input Group */

.input-group {
    margin-bottom: 20px;
}

.input-group label {
    display: block;
    margin-bottom: 8px;
    color: var(--text);
    font-size: 14px;
}

/* Input Box */

.input-box {
    height: 50px;
    display: flex;
    align-items: center;
    background: var(--input);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0 15px;
    transition: .3s;
}

.input-box:hover,
.input-box:focus-within {
    border-color: var(--primary);
    box-shadow: 0 0 12px rgba(6,182,212,0.25);
}

.input-box i {
    color: var(--primary);
    margin-right: 12px;
}

.input-box input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 14px;
}

.input-box input::placeholder {
    color: var(--secondary-text);
}

/* Password Eye */

.input-box button {
    border: none;
    background: none;
    cursor: pointer;
    color: var(--secondary-text);
}

.input-box button:hover {
    color: var(--primary);
}

/* Forgot Password */

#login-options {
    text-align: right;
    margin-bottom: 25px;
}

#login-options a {
    text-decoration: none;
    color: var(--primary);
    font-size: 14px;
    font-weight: 500;
}

#login-options a:hover {
    color: var(--hover);
}

/* Login Button */

#login-btn {
    width: 100%;
    height: 50px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 600;
    transition: .3s;
}

#login-btn i {
    margin-right: 8px;
}

#login-btn:hover {
    background: var(--hover);
    box-shadow: 0 0 20px rgba(6,182,212,0.45);
}

/* Divider */

#divider {
    display: flex;
    align-items: center;
    gap: 15px;
    margin: 30px 0;
    color: var(--secondary-text);
}

#divider::before,
#divider::after {
    content: "";
    height: 1px;
    flex: 1;
    background: var(--border);
}

/* Register Link */

#register {
    text-align: center;
    color: var(--secondary-text);
}

#register a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 600;
}

#register a:hover {
    color: var(--hover);
}

/* Right Section */

#right-section {
    width: 45%;
    background: var(--input);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px;
}

#illustration-container {
    text-align: center;
}

#illustration-container img {
    width: 80%;
    max-width: 350px;
    margin-bottom: 25px;
}

#illustration-container h2 {
    color: var(--primary);
    font-size: 28px;
    margin-bottom: 15px;
}

#illustration-container p {
    color: var(--secondary-text);
    line-height: 1.7;
    font-size: 14px;
}

/* Responsive */

@media (max-width:900px) {

    #login-container {
        flex-direction: column;
    }

    #left-section,
    #right-section {
        width: 100%;
    }

    #left-section {
        padding: 35px 25px;
    }

    #right-section {
        display: none;
    }
}

@media (max-width:500px) {

    #welcome-text h2 {
        font-size: 24px;
    }

    #logo h1 {
        font-size: 22px;
    }
}</style>
<body>

    <div id="login-container">

        <!-- Left Side -->
        <section id="left-section">

            <!-- Logo -->
            <div id="logo">

                <i class="fa-solid fa-truck-fast"></i>

                <div>

                    <h1>TransitOps</h1>

                    <p>Smart Transport Operations Platform</p>

                </div>

            </div>

            <!-- Heading -->
            <div id="welcome-text">

                <h2>Sign in to your account</h2>

                <p>Enter your credentials to continue</p>

            </div>

            <!-- Login Form -->
            <form id="login-form">

                <!-- Email -->

                <div class="input-group">

                    <label for="email">Email</label>

                    <div class="input-box">

                        <i class="fa-solid fa-envelope"></i>

                        <input
                            type="email"
                            id="email"
                            placeholder="Enter your email"
                            required>

                    </div>

                </div>

                <!-- Password -->

                <div class="input-group">

                    <label for="password">Password</label>

                    <div class="input-box">

                        <i class="fa-solid fa-lock"></i>

                        <input
                            type="password"
                            id="password"
                            placeholder="Enter your password"
                            required>

                        <button
                            type="button"
                            id="toggle-password">

                            <i class="fa-solid fa-eye"></i>

                        </button>

                    </div>

                </div>

                <!-- Forgot Password -->

                <div id="login-options">

                    <a href="forgot-password.html">

                        Forgot Password?

                    </a>

                </div>

                <!-- Login Button -->

                <button
                    type="submit"
                    id="login-btn">

                    <i class="fa-solid fa-right-to-bracket"></i>

                    Sign In

                </button>

            </form>

            <!-- Divider -->

            <div id="divider">

                <span>OR</span>

            </div>

            <!-- Register -->

            <div id="register">

                <p>

                    Don't have an account?

                    <a href="register.html">

                        Register Here

                    </a>

                </p>

            </div>

        </section>

        <!-- Right Side -->

        <aside id="right-section">

            <div id="illustration-container">

                <img
                    src="assets/login-illustration.png"
                    alt="TransitOps Illustration">

                <h2>Welcome to TransitOps</h2>

                <p>

                    Manage your fleet, drivers, trips, maintenance,
                    fuel expenses and reports from one centralized platform.

                </p>

            </div>

        </aside>

    </div>

   <script>
    // =========================
    // Login Form Submit
    // =========================

    document.getElementById("login-form").addEventListener("submit", async (event) => {

        event.preventDefault();

        const button = document.getElementById("login-btn");
        button.disabled = true;

        try {

            const response = await fetch("/api/login", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({

                    email: document.getElementById("email").value,

                    password: document.getElementById("password").value

                })

            });

            const result = await response.json();

            if (!response.ok) {

                throw new Error(result.detail || "Unable to sign in.");

            }

            alert(result.message);

            window.location.href = "/dashboard";

        }

        catch (error) {

            alert(error.message);

        }

        finally {

            button.disabled = false;

        }

    });


    // =========================
    // Password Show / Hide
    // =========================

    const passwordInput = document.getElementById("password");
    const togglePassword = document.getElementById("toggle-password");

    togglePassword.addEventListener("click", function () {

        const icon = this.querySelector("i");

        if (passwordInput.type === "password") {

            passwordInput.type = "text";

            icon.classList.remove("fa-eye");
            icon.classList.add("fa-eye-slash");

        } else {

            passwordInput.type = "password";

            icon.classList.remove("fa-eye-slash");
            icon.classList.add("fa-eye");

        }

    });

</script>
</body>

</html>
